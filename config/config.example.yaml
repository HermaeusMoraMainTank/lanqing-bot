# 从 QQ 开放平台获取：https://bot.q.qq.com/
# 注册机器人后，在「开发设置」页获取 AppID 与 AppSecret
appid: "你的AppID"
secret: "你的AppSecret"

# 启用的场景（按需开启，需在开放平台同步订阅对应事件）
scenes:
  guild: false
  group: true
  c2c: false

# NcatBot 资源路径（tarot 图片与 yml），默认同级目录 ../NcatBot/data
# ncatbot_data: "C:/Users/.../NcatBot/data"

# 可选：VIP openid 列表（jrrp 固定 101，tarot 提高 Blacksouls 概率）
# jrrp_vip_openids: []
# anime_waifu_dir: "C:/Users/.../wife"
# admin_openids: []
