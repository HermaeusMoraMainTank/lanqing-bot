# ═══════════════════════════════════════════════════════════
# QQ 开放平台 · 新插件配置模板（复制后填写）
# 路径：q.qq.com → 你的机器人 → 功能配置
# 插件：your_plugin | 版本：1.0.0
# ═══════════════════════════════════════════════════════════

# ── 一、服务配置 ─────────────────────────────────────────
# 纯文字插件填：服务配置: 无需配置
# 需要跳转小程序时，按下方格式填写（可多条）：

服务配置: 无需配置

# 需要小程序时改为：
# 服务列表:
#   - ID: 1
#     名称: 服务名称          # ≤5字，中英数字
#     介绍: 服务简介           # ≤15字，中英数字
#     appID: 小程序AppID       # 注意：不是机器人 AppID
#     path: pages/index/index
#     extendData: ""           # 群聊/单聊留空；频道可用 guildID=$OPENGUILDID$
#     权限菜单: 所有人          # 所有人 | 频道主和管理员
#     使用场景:
#       - QQ群                # 按需勾选：QQ频道 / 频道私信 / QQ群 / 消息列表

# ── 二、指令配置 ─────────────────────────────────────────

指令列表:
  - ID: 1
    指令名: 指令名            # 不带斜杠，官网会自动显示为 /指令名
    指令介绍: 指令简介         # ≤15字
    权限菜单: 所有人
    使用场景:
      - QQ群
    是否传参: 否              # 否 | 是（提审前务必准确填写）

事件订阅:
  - GROUP_AT_MESSAGE_CREATE   # 群：GROUP_AT_MESSAGE_CREATE
  # - AT_MESSAGE_CREATE       # 频道
  # - C2C_MESSAGE_CREATE      # 单聊

沙箱:
  步骤: 沙箱配置 → QQ群配置 → 选测试群 → 手机QQ群设置 → 群机器人 → 添加测试机器人
  测试: "@机器人 指令名"
