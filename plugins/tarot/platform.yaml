服务配置: 无需配置

指令列表:
  - ID: 1
    指令名: 占卜
    指令介绍: 抽取一张塔罗牌
    权限菜单: 所有人
    使用场景:
      - QQ群
    是否传参: 否

事件订阅:
  - GROUP_AT_MESSAGE_CREATE

沙箱:
  步骤: 沙箱配置 → QQ群配置 → 选测试群 → 手机QQ群设置 → 群机器人 → 添加测试机器人
  测试: "@机器人 占卜" 或 输入框输入 "/占卜"
