事件订阅:
  - GROUP_AT_MESSAGE_CREATE

沙箱:
  步骤: 沙箱配置 → QQ群配置 → 选测试群 → 手机QQ群设置 → 群机器人 → 添加测试机器人
  测试: "@机器人 帮助" 或 输入框输入 "/帮助"
